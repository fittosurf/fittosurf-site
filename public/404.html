<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — FitToSurf</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .notfound {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
  }
  .notfound h1 { font-size: 48px; margin-bottom: 16px; }
  .notfound p { color: var(--ink-soft); margin-bottom: 28px; }
</style>
</head>
<body>
  <div class="notfound">
    <h1>404</h1>
    <p>Cette vague n'existe pas. Retourne à l'accueil.</p>
    <a href="/" class="btn btn--primary"><span>Retour à l'accueil</span><span class="btn__icon">↓</span></a>
  </div>
</body>
</html>
